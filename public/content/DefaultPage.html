<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manual de Taller - Mazda 3</title>

  <!-- Blindaje para evitar que el navegador distorsione los colores desde el iframe padre -->
  <meta name="color-scheme" content="only light">

  <!-- Tipografía Google Fonts & FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/db200e48e3.js" crossorigin="anonymous"></script>

  <style>
    :root {
      color-scheme: light;
      --primary-color: #0956d2;
      --text-main: #2c3e50;
      --text-muted: #7f8c8d;
      --card-bg: #ffffff;
      --page-bg: #f8fafc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--page-bg);
      color: var(--text-main);
      padding: 1.5rem;
    }

    /* Tarjeta contenedora elevada */
    .card-container {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0, 0, 0, 0.03);
      border: 1px solid rgba(226, 232, 240, 0.8);
      padding: 2.5rem 2rem;
      max-width: 580px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      transition: transform 0.2s ease;
    }

    /* Insignia / Badge técnico */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(9, 86, 210, 0.08);
      color: var(--primary-color);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    /* Contenedor de la ilustración / coche */
    .hero-image {
      width: 100%;
      max-width: 440px;
      height: 220px;
      background-image: url('/content/M32003-2007.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      margin-bottom: 1.5rem;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.06));
    }

    /* Separador sutil */
    .divider {
      width: 40px;
      height: 3px;
      background-color: var(--primary-color);
      border-radius: 2px;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    /* Sección de textos de copyright */
    .disclaimer-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .paragraph {
      font-size: 0.8125rem; /* 13px */
      line-height: 1.6;
      color: var(--text-muted);
      font-weight: 400;
    }

    .paragraph strong {
      color: var(--text-main);
      font-weight: 500;
    }

    /* Responsivo para dispositivos móviles */
    @media (max-width: 550px) {
      body {
        padding: 1rem;
      }

      .card-container {
        padding: 1.75rem 1.25rem;
      }

      .hero-image {
        height: 160px;
        margin-bottom: 1rem;
      }

      .paragraph {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <main class="card-container">
    <!-- Badge decorativo -->
    <div class="badge">
      <i class="fa-solid fa-book-open"></i>
      <span>Manual de Taller</span>
    </div>

    <!-- Imagen del vehículo -->
    <div class="hero-image" role="img" aria-label="Mazda 3 2003-2007"></div>

    <div class="divider"></div>

    <!-- Leyendas de propiedad -->
    <div class="disclaimer-group">
      <p class="paragraph">
        <strong>*Mazda</strong>, el logotipo y el nombre son propiedad exclusiva de <strong>Mazda Motor Corporation</strong>. Todos los derechos reservados.
      </p>
      <p class="paragraph">
        <strong>*Mazda</strong> logo and name are property of <strong>Mazda Motor Corporation</strong>. All rights reserved.
      </p>
    </div>
  </main>

</body>
</html>
